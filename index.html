<!DOCTYPE html>
<html>

<head>

    <title>AI Handwriting Generator</title>

    <style>

        body{
            margin:0;
            padding:0;
            background: linear-gradient(to right,#1e1e2f,#2c3e50);
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:850px;
            background: rgba(255,255,255,0.08);
            padding:40px;
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow:0px 0px 25px rgba(0,0,0,0.4);
            text-align:center;
            color:white;
        }

        h1{
            margin-bottom:25px;
            font-size:38px;
        }

        textarea{
            width:90%;
            height:220px;
            padding:18px;
            border:none;
            border-radius:12px;
            font-size:18px;
            resize:none;
            outline:none;
            background:#f5f5f5;
        }

        button{
            margin-top:20px;
            padding:14px 30px;
            border:none;
            border-radius:10px;
            background:#00b894;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#00997a;
            transform:scale(1.05);
        }

        .output{
            margin-top:35px;
        }

        img{
            width:100%;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.5);
            margin-top:15px;
        }

        .download-btns{
            margin-top:25px;
        }

        .download-btns a{
            text-decoration:none;
            padding:12px 24px;
            background:#0984e3;
            color:white;
            border-radius:10px;
            margin:10px;
            display:inline-block;
            transition:0.3s;
        }

        .download-btns a:hover{
            background:#0767b1;
            transform:scale(1.05);
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>📝 AI Handwriting Generator</h1>

        <form method="POST">

            <textarea
            name="text"
            placeholder="Write or paste your text here..."
            wrap="soft"
            spellcheck="false"
            ></textarea>

            <br>

            <button type="submit">
                Generate Handwriting
            </button>

        </form>

        {% if show %}

        <div class="output">

            <h2>Your Handwriting Output</h2>

            <img src="{{ url_for('static', filename='output.png') }}">

            <div class="download-btns">

                <a href="{{ url_for('static', filename='output.png') }}" download>
                    Download Image
                </a>

                <a href="{{ url_for('static', filename='output.pdf') }}" download>
                    Download PDF
                </a>

            </div>

        </div>

        {% endif %}

    </div>

</body>

</html>
